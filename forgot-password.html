<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password</title>
</head>
<body>

  <h1>Forgot Password</h1>
  <p>Enter your email address and we will send you a link to reset your password.</p>

  <form>
    <label for="email">Email:</label><br>
    <input type="email" id="email" name="email" placeholder="you@example.com"><br><br>

    <input type="submit" value="Send Reset Link">
  </form>

  <br>

  <p>Remembered your password? <a href="login.html">Go back to Login</a></p>
  <p>Already have a reset link? <a href="reset-password.html">Reset your password</a></p>

</body>
</html>
