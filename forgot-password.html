<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="auth-page">
    <div class="card auth-card">
      <div class="card-body">
      <div class="logo"><i class="bi bi-envelope-fill"></i></div>
      <h1 class="title">Forgot Password</h1>
      <p class="sub" id="helpText">We will send reset link to your email</p>

      <form id="forgotForm" novalidate>
        <div class="mb-3">
          <label class="form-label" for="email">Email</label>
          <input class="form-control" type="email" id="email" placeholder="you@example.com">
          <div class="err" id="emailErr">Please enter valid email.</div>
        </div>
        <button class="main-btn" id="sendBtn" type="submit">Send Link</button>
      </form>

      <div class="alert alert-light border mt-3 mb-0">
        Check spam folder if you do not get email in 2 minutes.
      </div>

      <p class="small-note mt-3 mb-0">
        Remember password? <a class="main-link" href="index.html">Back to login</a><br>
        Need account? <a class="main-link" href="register.html">Register</a>
      </p>
    </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    var savedEmail = localStorage.getItem("userEmail");
    if (savedEmail) {
      document.getElementById("email").value = savedEmail;
      document.getElementById("helpText").textContent = "We will send reset link to " + savedEmail;
    }

    document.getElementById("forgotForm").addEventListener("submit", function (e) {
      e.preventDefault();
      var email = document.getElementById("email");
      var ok = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email.value);
      email.classList.remove("bad", "good");
      document.getElementById("emailErr").style.display = "none";

      if (!ok) {
        email.classList.add("bad");
        document.getElementById("emailErr").style.display = "block";
        return;
      }

      email.classList.add("good");
      localStorage.setItem("resetEmail", email.value.trim());
      var btn = document.getElementById("sendBtn");
      btn.disabled = true;
      btn.textContent = "Sending...";
      setTimeout(function () {
        window.location.href = "reset-password.html";
      }, 900);
    });
  </script>
</body>
</html>
