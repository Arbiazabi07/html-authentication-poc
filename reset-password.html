<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="auth-page">
    <div class="card auth-card">
      <div class="card-body">
      <div class="logo"><i class="bi bi-shield-check"></i></div>
      <h1 class="title">Reset Password</h1>
      <p class="sub" id="resetText">Set a new strong password</p>

      <form id="resetForm" novalidate>
        <div class="mb-3">
          <label class="form-label" for="newPass">New Password</label>
          <div class="input-group">
            <input class="form-control" type="password" id="newPass" placeholder="At least 8 characters">
            <span class="input-group-text" id="showNew"><i class="bi bi-eye" id="eyeNew"></i></span>
          </div>
          <div class="strength" id="bars">
            <div id="b1"></div>
            <div id="b2"></div>
            <div id="b3"></div>
            <div id="b4"></div>
          </div>
          <div class="strength-text" id="barText"></div>
          <div class="err" id="newErr">Password must be at least 8 characters.</div>
        </div>

        <div class="mb-3">
          <label class="form-label" for="confirmPass">Confirm Password</label>
          <div class="input-group">
            <input class="form-control" type="password" id="confirmPass" placeholder="Type password again">
            <span class="input-group-text" id="showConfirm"><i class="bi bi-eye" id="eyeConfirm"></i></span>
          </div>
          <div class="err" id="confirmErr">Passwords do not match.</div>
        </div>

        <button class="main-btn" id="updateBtn" type="submit">Update Password</button>
      </form>

      <p class="small-note mt-3 mb-0">
        <a class="main-link" href="forgot-password.html">Back</a> |
        <a class="main-link" href="index.html">Login</a> |
        <a class="main-link" href="register.html">Register</a>
      </p>
    </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    var resetEmail = localStorage.getItem("resetEmail");
    if (resetEmail) {
      document.getElementById("resetText").textContent = "Reset password for " + resetEmail;
    }

    function toggle(btnId, inputId, eyeId) {
      var btn = document.getElementById(btnId);
      var input = document.getElementById(inputId);
      var eye = document.getElementById(eyeId);
      btn.addEventListener("click", function () {
        if (input.type === "password") {
          input.type = "text";
          eye.classList.replace("bi-eye", "bi-eye-slash");
        } else {
          input.type = "password";
          eye.classList.replace("bi-eye-slash", "bi-eye");
        }
      });
    }

    toggle("showNew", "newPass", "eyeNew");
    toggle("showConfirm", "confirmPass", "eyeConfirm");

    document.getElementById("newPass").addEventListener("input", function () {
      var text = document.getElementById("barText");
      var wrap = document.getElementById("bars");
      var p = this.value;
      var score = 0;
      var color = "#e5e7eb";
      var label = "";

      if (p.length === 0) {
        wrap.style.display = "none";
        text.textContent = "";
        return;
      }

      wrap.style.display = "flex";
      if (p.length >= 8) score++;
      if (/[A-Z]/.test(p)) score++;
      if (/[0-9]/.test(p)) score++;
      if (/[^A-Za-z0-9]/.test(p)) score++;

      if (score === 1) { color = "#ef4444"; label = "Weak"; }
      if (score === 2) { color = "#f59e0b"; label = "Fair"; }
      if (score === 3) { color = "#3b82f6"; label = "Good"; }
      if (score === 4) { color = "#16a34a"; label = "Strong"; }

      for (var i = 1; i <= 4; i++) document.getElementById("b" + i).style.background = "#e5e7eb";
      for (var j = 1; j <= score; j++) document.getElementById("b" + j).style.background = color;
      text.textContent = label;
      text.style.color = color;
    });

    document.getElementById("resetForm").addEventListener("submit", function (e) {
      e.preventDefault();
      var newPass = document.getElementById("newPass");
      var confirmPass = document.getElementById("confirmPass");
      var ok = true;
      newPass.classList.remove("bad", "good");
      confirmPass.classList.remove("bad", "good");
      document.getElementById("newErr").style.display = "none";
      document.getElementById("confirmErr").style.display = "none";

      if (newPass.value.length < 8) {
        newPass.classList.add("bad");
        document.getElementById("newErr").style.display = "block";
        ok = false;
      } else {
        newPass.classList.add("good");
      }

      if (confirmPass.value === "" || confirmPass.value !== newPass.value) {
        confirmPass.classList.add("bad");
        document.getElementById("confirmErr").style.display = "block";
        ok = false;
      } else {
        confirmPass.classList.add("good");
      }

      if (!ok) return;

      localStorage.removeItem("resetEmail");
      var btn = document.getElementById("updateBtn");
      btn.disabled = true;
      btn.textContent = "Updating...";
      setTimeout(function () {
        window.location.href = "index.html";
      }, 900);
    });
  </script>
</body>
</html>
