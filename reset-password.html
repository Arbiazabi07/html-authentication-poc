<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password</title>
</head>
<body>

  <h1>Reset Your Password</h1>
  <p>Enter a new password for your account.</p>

  <form>
    <label for="new-password">New Password:</label><br>
    <input type="password" id="new-password" name="new-password" placeholder="Enter new password"><br><br>

    <label for="confirm-password">Confirm New Password:</label><br>
    <input type="password" id="confirm-password" name="confirm-password" placeholder="Repeat new password"><br><br>

    <input type="submit" value="Reset Password">
  </form>

  <br>

  <p>Password reset successful? <a href="login.html">Go to Login</a></p>
  <p>Back to <a href="forgot-password.html">Forgot Password</a></p>

</body>
</html>
