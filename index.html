<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="auth-page">
    <div class="card auth-card">
      <div class="card-body">
      <div class="logo"><i class="bi bi-shield-lock-fill"></i></div>
      <h1 class="title">Login</h1>
      <p class="sub">Enter your account details</p>

      <form id="loginForm" novalidate>
        <div class="mb-3">
          <label class="form-label" for="email">Email</label>
          <input class="form-control" type="email" id="email" placeholder="you@example.com">
          <div class="err" id="emailErr">Please enter a valid email.</div>
        </div>

        <div class="mb-3">
          <div class="d-flex justify-content-between">
            <label class="form-label" for="password">Password</label>
            <a class="main-link" href="forgot-password.html">Forgot?</a>
          </div>
          <div class="input-group">
            <input class="form-control" type="password" id="password" placeholder="Password">
            <span class="input-group-text" id="showPwd"><i class="bi bi-eye" id="eyePwd"></i></span>
          </div>
          <div class="err" id="passErr">Password is required.</div>
        </div>

        <div class="form-check mb-3">
          <input class="form-check-input" type="checkbox" id="remember">
          <label class="form-check-label" for="remember">Remember me</label>
        </div>

        <button class="main-btn" id="loginBtn" type="submit">Login</button>
      </form>

      <p class="small-note mt-3 mb-0">
        New here? <a class="main-link" href="register.html">Create account</a><br>
      
      </p>
    </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    var showPwd = document.getElementById("showPwd");
    var password = document.getElementById("password");
    var eyePwd = document.getElementById("eyePwd");

    showPwd.addEventListener("click", function () {
      if (password.type === "password") {
        password.type = "text";
        eyePwd.classList.remove("bi-eye");
        eyePwd.classList.add("bi-eye-slash");
      } else {
        password.type = "password";
        eyePwd.classList.remove("bi-eye-slash");
        eyePwd.classList.add("bi-eye");
      }
    });

    document.getElementById("loginForm").addEventListener("submit", function (e) {
      e.preventDefault();
      var email = document.getElementById("email");
      var pass = document.getElementById("password");
      var emailErr = document.getElementById("emailErr");
      var passErr = document.getElementById("passErr");
      var emailOk = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email.value);
      var passOk = pass.value.trim() !== "";

      email.classList.remove("bad", "good");
      pass.classList.remove("bad", "good");
      emailErr.style.display = "none";
      passErr.style.display = "none";

      if (!emailOk) {
        email.classList.add("bad");
        emailErr.style.display = "block";
      } else {
        email.classList.add("good");
      }

      if (!passOk) {
        pass.classList.add("bad");
        passErr.style.display = "block";
      } else {
        pass.classList.add("good");
      }

      if (!emailOk || !passOk) return;

      localStorage.setItem("userEmail", email.value.trim());
      if (!localStorage.getItem("userName")) {
        localStorage.setItem("userName", "Student User");
      }

      var btn = document.getElementById("loginBtn");
      btn.disabled = true;
      btn.textContent = "Please wait...";
      setTimeout(function () {
        window.location.href = "dashboard.html";
      }, 900);
    });
  </script>
</body>
</html>
