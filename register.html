<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register</title>
</head>
<body>

  <h1>Create an Account</h1>
  <p>Fill in the details below to register.</p>

  <form>
    <label for="name">Full Name:</label><br>
    <input type="text" id="name" name="name" placeholder="John Doe"><br><br>

    <label for="email">Email:</label><br>
    <input type="email" id="email" name="email" placeholder="you@example.com"><br><br>

    <label for="password">Password:</label><br>
    <input type="password" id="password" name="password" placeholder="Choose a password"><br><br>

    <label for="confirm">Confirm Password:</label><br>
    <input type="password" id="confirm" name="confirm" placeholder="Repeat your password"><br><br>

    <input type="submit" value="Register">
  </form>

  <br>

  <p>Already have an account? <a href="login.html">Login here</a></p>

</body>
</html>
