<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="auth-page">
    <div class="card auth-card">
      <div class="card-body">
      <div class="logo"><i class="bi bi-person-plus-fill"></i></div>
      <h1 class="title">Register</h1>
      <p class="sub">Create your account</p>

      <form id="regForm" novalidate>
        <div class="mb-3">
          <label class="form-label" for="name">Full Name</label>
          <input class="form-control" id="name" type="text" placeholder="Your name">
          <div class="err" id="nameErr">Please enter your name.</div>
        </div>

        <div class="mb-3">
          <label class="form-label" for="email">Email</label>
          <input class="form-control" id="email" type="email" placeholder="you@example.com">
          <div class="err" id="emailErr">Please enter valid email.</div>
        </div>

        <div class="mb-3">
          <label class="form-label" for="password">Password</label>
          <div class="input-group">
            <input class="form-control" id="password" type="password" placeholder="At least 8 characters">
            <span class="input-group-text" id="showPwd"><i class="bi bi-eye" id="eyePwd"></i></span>
          </div>
          <div class="strength" id="bars">
            <div id="b1"></div>
            <div id="b2"></div>
            <div id="b3"></div>
            <div id="b4"></div>
          </div>
          <div class="strength-text" id="barText"></div>
          <div class="err" id="passErr">Password must be at least 8 characters.</div>
        </div>

        <div class="mb-3">
          <label class="form-label" for="confirm">Confirm Password</label>
          <div class="input-group">
            <input class="form-control" id="confirm" type="password" placeholder="Type again">
            <span class="input-group-text" id="showConfirm"><i class="bi bi-eye" id="eyeConfirm"></i></span>
          </div>
          <div class="err" id="confirmErr">Passwords do not match.</div>
        </div>

        <div class="form-check mb-3">
          <input class="form-check-input" type="checkbox" id="terms">
          <label class="form-check-label" for="terms">I agree with terms</label>
          <div class="err" id="termsErr">Please accept terms.</div>
        </div>

        <button class="main-btn" id="regBtn" type="submit">Create Account</button>
      </form>

      <p class="small-note mt-3 mb-0">
        Already have account? <a class="main-link" href="index.html">Login</a><br>
      </p>
    </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    function toggle(btnId, inputId, eyeId) {
      var btn = document.getElementById(btnId);
      var input = document.getElementById(inputId);
      var eye = document.getElementById(eyeId);
      btn.addEventListener("click", function () {
        if (input.type === "password") {
          input.type = "text";
          eye.classList.replace("bi-eye", "bi-eye-slash");
        } else {
          input.type = "password";
          eye.classList.replace("bi-eye-slash", "bi-eye");
        }
      });
    }

    toggle("showPwd", "password", "eyePwd");
    toggle("showConfirm", "confirm", "eyeConfirm");

    document.getElementById("password").addEventListener("input", function () {
      var text = document.getElementById("barText");
      var wrap = document.getElementById("bars");
      var p = this.value;
      var score = 0;
      var color = "#e5e7eb";
      var label = "";

      if (p.length === 0) {
        wrap.style.display = "none";
        text.textContent = "";
        return;
      }

      wrap.style.display = "flex";
      if (p.length >= 8) score++;
      if (/[A-Z]/.test(p)) score++;
      if (/[0-9]/.test(p)) score++;
      if (/[^A-Za-z0-9]/.test(p)) score++;

      if (score === 1) { color = "#ef4444"; label = "Weak"; }
      if (score === 2) { color = "#f59e0b"; label = "Fair"; }
      if (score === 3) { color = "#3b82f6"; label = "Good"; }
      if (score === 4) { color = "#16a34a"; label = "Strong"; }

      for (var i = 1; i <= 4; i++) document.getElementById("b" + i).style.background = "#e5e7eb";
      for (var j = 1; j <= score; j++) document.getElementById("b" + j).style.background = color;
      text.textContent = label;
      text.style.color = color;
    });

    document.getElementById("regForm").addEventListener("submit", function (e) {
      e.preventDefault();
      var name = document.getElementById("name");
      var email = document.getElementById("email");
      var pass = document.getElementById("password");
      var confirm = document.getElementById("confirm");
      var terms = document.getElementById("terms");
      var emailOk = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email.value);
      var ok = true;

      var items = [name, email, pass, confirm];
      for (var i = 0; i < items.length; i++) items[i].classList.remove("bad", "good");
      document.getElementById("nameErr").style.display = "none";
      document.getElementById("emailErr").style.display = "none";
      document.getElementById("passErr").style.display = "none";
      document.getElementById("confirmErr").style.display = "none";
      document.getElementById("termsErr").style.display = "none";

      if (name.value.trim() === "") { name.classList.add("bad"); document.getElementById("nameErr").style.display = "block"; ok = false; } else { name.classList.add("good"); }
      if (!emailOk) { email.classList.add("bad"); document.getElementById("emailErr").style.display = "block"; ok = false; } else { email.classList.add("good"); }
      if (pass.value.length < 8) { pass.classList.add("bad"); document.getElementById("passErr").style.display = "block"; ok = false; } else { pass.classList.add("good"); }
      if (confirm.value === "" || confirm.value !== pass.value) { confirm.classList.add("bad"); document.getElementById("confirmErr").style.display = "block"; ok = false; } else { confirm.classList.add("good"); }
      if (!terms.checked) { document.getElementById("termsErr").style.display = "block"; ok = false; }

      if (!ok) return;

      localStorage.setItem("userName", name.value.trim());
      localStorage.setItem("userEmail", email.value.trim());

      var btn = document.getElementById("regBtn");
      btn.disabled = true;
      btn.textContent = "Creating...";
      setTimeout(function () {
        window.location.href = "dashboard.html";
      }, 1000);
    });
  </script>
</body>
</html>
